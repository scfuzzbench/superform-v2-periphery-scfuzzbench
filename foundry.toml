# Full reference https://github.com/foundry-rs/foundry/tree/master/crates/config

[profile.default]
cache_path = "cache"
auto_detect_solc = false
fuzz = { runs = 10 }
gas_reports = ["*"]
optimizer = true
optimizer_runs = 200
out = "out"
script = "script"
solc = "0.8.30"
src = "src"
test = "test"
cbor_metadata = true
libs = ['lib']
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]
remappings = [
  "@superform-v2-core/=lib/v2-core/",
  "@openzeppelin/contracts/=lib/v2-core/lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "@chimera/=lib/setup-helpers/lib/chimera/src/",
  "@recon/=lib/setup-helpers/src/",
  "excessivelySafeCall/=lib/v2-core/lib/ExcessivelySafeCall/src/",
  "modulekit/=lib/v2-core/lib/modulekit/src/",
  "@prb/math/=lib/prb-math/src/",
  "@solady/=lib/v2-core/lib/solady/",
  "@account-abstraction/=lib/account-abstraction/contracts/",
  "@ERC4337/account-abstraction/=lib/account-abstraction/",
  "@ERC4337/account-abstraction-v0.6/=lib/account-abstraction-v0.6/",
  "@pigeon/=lib/v2-core/lib/pigeon/src/",
  "@surl/=lib/v2-core/lib/surl/src/",
  "@stringutils/=lib/v2-core/lib/solidity-stringutils/src/",
  "@pendle/=lib/v2-core/lib/pendle-core-v2-public/contracts/",
  "@safe/=lib/v2-core/lib/safe-smart-account/contracts/",
  "@safe7579/=lib/v2-core/lib/safe7579/src/",
  "@nexus/=lib/v2-core/lib/nexus/contracts/",
  "@properties-7540/=lib/erc7540-reusable-properties/src/",
  "sentinellist/=lib/sentinellist/src/",
  "solady/=lib/v2-core/lib/solady/src/",
  "solarray/=lib/solarray/src/",
  "account-abstraction/=lib/account-abstraction/contracts/",
  "account-abstraction-v0.6/=lib/account-abstraction-v0.6/contracts/",
  "excessively-safe-call/=lib/v2-core/lib/ExcessivelySafeCall/src/",
  "composability/=lib/composability/contracts/",
  "erc7739Validator/=lib/erc7739-validator/src/",
  "erc7579/=lib/erc7579/src/",
  "rhinestone/checknsignatures/=lib/checknsignatures/",
  "@safe-global/safe-contracts/=lib/v2-core/lib/safe-smart-account/",
  "test/mock_fiattoken/=lib/v2-core/lib/evm-gateway-contracts/test/mock_fiattoken/",
  "@rhinestone/erc4337-validation/=lib/erc4337-validation/",
  "erc4337-validation/=lib/erc4337-validation/src/",
  "forge-std/=lib/forge-std/src/",
  "halmos-cheatcodes/=lib/halmos-cheatcodes/src/"
]
dynamic_test_linking = true
gas_limit = "18446744073709551615"
gas_snapshot_emit= false # Added due to tests in test_extraGas in PaymasterPoC.t.sol
evm_version = "prague"
lint_on_build = false

[profile.ci-sizes]
script = "src"
src = "src"
test = "src"

[profile.coverage]
script = "src"
src = "src"
test = "test"
gas_limit = "18446744073709551615"


[profile.ci]
fuzz = { runs = 10_000 }
verbosity = 4

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[etherscan]
11155111 = { key = "${ETHERSCANV2_API_KEY_TEST}" }
11155420 = { key = "${ETHERSCANV2_API_KEY_TEST}" }
84532 = { key = "${ETHERSCANV2_API_KEY_TEST}" }

[lint]
exclude_lints = ["mixed-case-function"]
ignore = [
    "src/vendor/**", 
    "src/vendor/**/*.sol",
    "./src/vendor/**",
    "**/vendor/**",
    "lib/evm-gateway-contracts/**",
    "./lib/evm-gateway-contracts/**",
    "test/**", 
    "test/**/*.sol",
    "./test/**",
    "**/test/**"
]

[invariant]
runs = 500000000
depth = 100
include_storage = true
show_solidity = true
show_metrics = true
fail_on_revert = false
continuous_run = true
corpus_dir = "corpus/foundry"
